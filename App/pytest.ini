[pytest]
# Test discovery patterns
python_files = test_*.py
python_functions = test_*

# Directories to search for tests
testpaths = beaconapp/tests

# Markers for categorizing tests
markers =
    unit: Unit tests
    integration: Integration tests (require connected WSPR-beacon device)

# Coverage settings (only applied when --cov is used)
# Usage without test files in report:
#   pytest --cov=beaconapp --cov-config=pytest.ini
[coverage:run]
source = beaconapp
omit =
    beaconapp/tests/*
    **/__init__.py
    beaconapp/main.py
